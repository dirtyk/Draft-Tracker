<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RFL Dynasty Draft Tracker</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #ffffff;
            margin-bottom: 5px;
        }
        .status {
            text-align: center;
            margin-bottom: 20px;
            font-size: 0.9em;
            color: #aaaaaa;
        }
        
        .counter-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .counter-box {
            background-color: #1e1e24;
            border: 1px solid #333333;
            border-radius: 8px;
            padding: 15px 25px;
            text-align: center;
            min-width: 200px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }
        .counter-label {
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #bbbbbb;
            margin-bottom: 8px;
        }
        .kicker-count {
            color: #4ade80;
            font-size: 2.5em;
            font-weight: bold;
        }
        .defense-count {
            color: #f87171;
            font-size: 2.5em;
            font-weight: bold;
        }

        .search-container {
            text-align: center;
            margin-bottom: 20px;
        }
        #search-input {
            padding: 12px 20px;
            width: 100%;
            max-width: 400px;
            border-radius: 25px;
            border: 1px solid #444;
            background-color: #1e1e24;
            color: #fff;
            font-size: 1em;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
            outline: none;
        }
        #search-input:focus {
            border-color: #888;
        }

        .table-container {
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background-color: #1e1e24;
        }
        th, td {
            padding: 12px 15px;
            text-align: left;
            border: 1px solid #333333;
        }
        th {
            background-color: #282a36;
            color: #ffffff;
            font-weight: bold;
        }
        tr:hover {
            background-color: #2a2d3d;
        }
        .kicker {
            color: #4ade80; 
            font-weight: bold;
        }
        .defense {
            color: #f87171; 
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>RFL Dynasty Draft Tracker</h1>
    <div class="status" id="status">Connecting to Sleeper API...</div>

    <div class="counter-container">
        <div class="counter-box">
            <div class="counter-label">2026 Picks (K)</div>
            <div class="kicker-count" id="kicker-tally">0</div>
        </div>
        <div class="counter-box">
            <div class="counter-label">2027 Picks (DEF)</div>
            <div class="defense-count" id="defense-tally">0</div>
        </div>
    </div>

    <div class="search-container">
        <input type="text" id="search-input" placeholder="Search by team name..." onkeyup="applySearchFilter()">
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Team</th>
                    <th>Selection</th>
                    <th>Position</th>
                    <th>2026 Pick</th>
                    <th>2027 Pick</th>
                </tr>
            </thead>
            <tbody id="tracker-body">
            </tbody>
        </table>
    </div>

    <script>
        const DRAFT_ID = "1338281244483411968";
        const PICKS_URL = `https://api.sleeper.app/v1/draft/${DRAFT_ID}/picks`;
        const USER_API_URL = "https://api.sleeper.app/v1/user/";
        
        const userCache = {};

        function calculateRookiePick(count) {
            if (count === 0) return "";
            const roundNum = Math.floor((count - 1) / 12) + 1;
            const pickNum = ((count - 1) % 12) + 1;
            return `${roundNum}.${pickNum.toString().padStart(2, '0')}`;
        }

        async function fetchUsername(userId) {
            if (!userId) return "Unknown";
            if (userCache[userId]) return userCache[userId];
            
            try {
                const response = await fetch(`${USER_API_URL}${userId}`);
                if (response.ok) {
                    const data = await response.json();
                    userCache[userId] = data.display_name || userId;
                    return userCache[userId];
                }
            } catch (error) {
                console.error("Error fetching user:", error);
            }
            return userId; 
        }

        function applySearchFilter() {
            const filterText = document.getElementById("search-input").value.toLowerCase();
            const rows = document.getElementById("tracker-body").getElementsByTagName("tr");

            if (rows.length === 1 && rows[0].innerText.includes("Waiting")) return;

            for (let i = 0; i < rows.length; i++) {
                const teamCell = rows[i].getElementsByTagName("td")[0];
                if (teamCell) {
                    const teamName = teamCell.textContent || teamCell.innerText;
                    if (teamName.toLowerCase().indexOf(filterText) > -1) {
                        rows[i].style.display = ""; 
                    } else {
                        rows[i].style.display = "none"; 
                    }
                }
            }
        }

        async function trackDraft() {
            const statusEl = document.getElementById("status");
            try {
                const response = await fetch(PICKS_URL);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                
                let picks = await response.json();
                
                if (!picks || !Array.isArray(picks)) {
                    picks = []; 
                }

                // FIX 1: Sort the draft picks sequentially by overall pick number
                picks.sort((a, b) => a.pick_no - b.pick_no);
                
                let kCount = 0;
                let defCount = 0;
                const rows = [];

                for (const pick of picks) {
                    const metadata = pick.metadata || {};
                    const position = metadata.position || '';
                    
                    if (position === 'K' || position === 'DEF') {
                        const teamName = await fetchUsername(pick.picked_by);
                        
                        // FIX 2: Calculate actual pick within the round using overall pick_no (12-team math)
                        const pickInRound = ((pick.pick_no - 1) % 12) + 1;
                        const selectionStr = `Round ${pick.round}, Pick ${pickInRound}`;
                        
                        let pick2026 = "";
                        let pick2027 = "";
                        let posClass = "";
                        let posLabel = "";
                        
                        if (position === 'K') {
                            kCount++;
                            pick2026 = calculateRookiePick(kCount);
                            posClass = "kicker";
                            posLabel = "Kicker";
                        } else if (position === 'DEF') {
                            defCount++;
                            pick2027 = calculateRookiePick(defCount);
                            posClass = "defense";
                            posLabel = "Defense";
                        }
                        
                        rows.push(`
                            <tr>
                                <td>${teamName}</td>
                                <td>${selectionStr}</td>
                                <td class="${posClass}">${posLabel}</td>
                                <td>${pick2026}</td>
                                <td>${pick2027}</td>
                            </tr>
                        `);
                    }
                }

                document.getElementById("kicker-tally").innerText = kCount;
                document.getElementById("defense-tally").innerText = defCount;

                const tbody = document.getElementById("tracker-body");
                if (rows.length > 0) {
                    tbody.innerHTML = rows.join("");
                } else {
                    tbody.innerHTML = "<tr><td colspan='5' style='text-align:center;'>Waiting for the first Kicker or Defense to be selected...</td></tr>";
                }
                
                applySearchFilter();

                const now = new Date();
                statusEl.innerText = `Last updated: ${now.toLocaleTimeString()} (Polling every 5 seconds)`;

            } catch (error) {
                console.error("Error fetching draft data:", error);
                statusEl.innerText = "Error connecting to Sleeper API. Check console for details.";
            }
        }

        trackDraft();
        setInterval(trackDraft, 5000);
    </script>
</body>
</html>
