<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RFL Dynasty Draft Tracker</title>
    <style>
        /* Base Theme matching the screenshot */
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0b1320; /* Deep navy background */
            color: #94a3b8; /* Muted light blue/gray text */
            margin: 0;
            padding: 20px;
        }

        /* Title Styling */
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1000px;
            margin: 0 auto 20px auto;
            border-bottom: 2px solid #1e3a8a;
            padding-bottom: 15px;
        }

        h1 {
            margin: 0;
            font-family: 'Impact', 'Arial Black', sans-serif;
            font-style: italic;
            letter-spacing: 1px;
            font-size: 2.2em;
            text-transform: uppercase;
        }
        
        .title-cyan { color: #00e5ff; }
        .title-orange { color: #ff4b4b; }

        .status-pill {
            background-color: rgba(16, 185, 129, 0.1);
            border: 1px solid #10b981;
            color: #10b981;
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-pill::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 8px #10b981;
        }

        /* Tally Counters */
        .counter-container {
            display: flex;
            justify-content: flex-start;
            gap: 15px;
            max-width: 1000px;
            margin: 0 auto 20px auto;
        }
        
        .counter-box {
            background-color: #10192b; /* Dark panel background */
            border: 1px solid #1e3a8a;
            border-radius: 6px;
            padding: 15px 20px;
            min-width: 180px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .counter-label {
            font-size: 0.75em;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #94a3b8;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .kicker-count {
            color: #00e5ff; /* Cyan for 2026 */
            font-size: 2em;
            font-weight: bold;
            font-family: monospace;
        }
        
        .defense-count {
            color: #ff4b4b; /* Orange/Red for 2027 */
            font-size: 2em;
            font-weight: bold;
            font-family: monospace;
        }

        /* Search Bar */
        .search-container {
            max-width: 1000px;
            margin: 0 auto 15px auto;
        }
        
        #search-input {
            padding: 10px 15px;
            width: 100%;
            max-width: 300px;
            border-radius: 6px;
            border: 1px solid #1e3a8a;
            background-color: #0b1320;
            color: #f8fafc;
            font-size: 0.9em;
            outline: none;
            transition: border-color 0.2s;
        }
        
        #search-input:focus {
            border-color: #00e5ff;
        }
        
        #search-input::placeholder {
            color: #475569;
        }

        /* Table Styles */
        .table-container {
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
            border-radius: 6px;
            border: 1px solid #1e3a8a;
            background-color: #10192b;
            overflow: hidden;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            padding: 12px 20px;
            text-align: left;
            border-bottom: 1px solid #1e293b;
        }
        
        th {
            background-color: #0b1320;
            color: #e2e8f0;
            font-size: 0.75em;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: bold;
            border-bottom: 1px solid #1e3a8a;
        }
        
        tr:last-child td {
            border-bottom: none;
        }

        tr:hover {
            background-color: #1e293b;
        }
        
        /* Highlighted Text */
        .team-name {
            color: #f8fafc;
            font-weight: 500;
        }
        
        .kicker { color: #00e5ff; font-weight: bold; }
        .defense { color: #ff4b4b; font-weight: bold; }
        
        .rookie-pick {
            background-color: rgba(255, 255, 255, 0.05);
            padding: 4px 8px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 1.1em;
            color: #f8fafc;
        }

    </style>
</head>
<body>

    <div class="header-container">
        <h1><span class="title-cyan">RFL DYNASTY</span> <span class="title-orange">DRAFT TRACKER</span></h1>
        <div class="status-pill" id="status">Connecting...</div>
    </div>

    <div class="counter-container">
        <div class="counter-box">
            <div class="counter-label">2026 Picks (K)</div>
            <div class="kicker-count" id="kicker-tally">0</div>
        </div>
        <div class="counter-box">
            <div class="counter-label">2027 Picks (DEF)</div>
            <div class="defense-count" id="defense-tally">0</div>
        </div>
    </div>

    <div class="search-container">
        <input type="text" id="search-input" placeholder="Search by team name..." onkeyup="applySearchFilter()">
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Team</th>
                    <th>Selection</th>
                    <th>Position</th>
                    <th>2026 Pick</th>
                    <th>2027 Pick</th>
                </tr>
            </thead>
            <tbody id="tracker-body">
            </tbody>
        </table>
    </div>

    <script>
        const DRAFT_ID = "1338281244483411968";
        const PICKS_URL = `https://api.sleeper.app/v1/draft/${DRAFT_ID}/picks`;
        const USER_API_URL = "https://api.sleeper.app/v1/user/";
        
        const userCache = {};

        function calculateRookiePick(count) {
            if (count === 0) return "";
            const roundNum = Math.floor((count - 1) / 12) + 1;
            const pickNum = ((count - 1) % 12) + 1;
            return `${roundNum}.${pickNum.toString().padStart(2, '0')}`;
        }

        async function fetchUsername(userId) {
            if (!userId) return "Unknown";
            if (userCache[userId]) return userCache[userId];
            
            try {
                const response = await fetch(`${USER_API_URL}${userId}`);
                if (response.ok) {
                    const data = await response.json();
                    userCache[userId] = data.display_name || userId;
                    return userCache[userId];
                }
            } catch (error) {
                console.error("Error fetching user:", error);
            }
            return userId; 
        }

        function applySearchFilter() {
            const filterText = document.getElementById("search-input").value.toLowerCase();
            const rows = document.getElementById("tracker-body").getElementsByTagName("tr");

            if (rows.length === 1 && rows[0].innerText.includes("Waiting")) return;

            for (let i = 0; i < rows.length; i++) {
                const teamCell = rows[i].getElementsByTagName("td")[0];
                if (teamCell) {
                    const teamName = teamCell.textContent || teamCell.innerText;
                    if (teamName.toLowerCase().indexOf(filterText) > -1) {
                        rows[i].style.display = ""; 
                    } else {
                        rows[i].style.display = "none"; 
                    }
                }
            }
        }

        async function trackDraft() {
            const statusEl = document.getElementById("status");
            try {
                const response = await fetch(PICKS_URL);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                
                let picks = await response.json();
                
                if (!picks || !Array.isArray(picks)) {
                    picks = []; 
                }

                picks.sort((a, b) => a.pick_no - b.pick_no);
                
                let kCount = 0;
                let defCount = 0;
                const rows = [];

                for (const pick of picks) {
                    const metadata = pick.metadata || {};
                    const position = metadata.position || '';
                    
                    if (position === 'K' || position === 'DEF') {
                        const teamName = await fetchUsername(pick.picked_by);
                        
                        const pickInRound = ((pick.pick_no - 1) % 12) + 1;
                        const selectionStr = `Rd ${pick.round} - Pk ${pickInRound}`;
                        
                        let pick2026 = "-";
                        let pick2027 = "-";
                        let posClass = "";
                        let posLabel = "";
                        
                        if (position === 'K') {
                            kCount++;
                            pick2026 = `<span class="rookie-pick">${calculateRookiePick(kCount)}</span>`;
                            posClass = "kicker";
                            posLabel = "Kicker";
                        } else if (position === 'DEF') {
                            defCount++;
                            pick2027 = `<span class="rookie-pick">${calculateRookiePick(defCount)}</span>`;
                            posClass = "defense";
                            posLabel = "Defense";
                        }
                        
                        rows.unshift(`
                            <tr>
                                <td class="team-name">${teamName}</td>
                                <td>${selectionStr}</td>
                                <td class="${posClass}">${posLabel}</td>
                                <td>${pick2026}</td>
                                <td>${pick2027}</td>
                            </tr>
                        `);
                    }
                }

                document.getElementById("kicker-tally").innerText = kCount;
                document.getElementById("defense-tally").innerText = defCount;

                const tbody = document.getElementById("tracker-body");
                if (rows.length > 0) {
                    tbody.innerHTML = rows.join("");
                } else {
                    tbody.innerHTML = "<tr><td colspan='5' style='text-align:center; padding: 30px;'>Waiting for the first Kicker or Defense to be selected...</td></tr>";
                }
                
                applySearchFilter();

                const now = new Date();
                statusEl.innerHTML = `Live: ${now.toLocaleTimeString()}`;

            } catch (error) {
                console.error("Error fetching draft data:", error);
                statusEl.innerHTML = "Connection Error";
                statusEl.style.color = "#ff4b4b";
                statusEl.style.borderColor = "#ff4b4b";
                statusEl.style.backgroundColor = "rgba(255, 75, 75, 0.1)";
            }
        }

        trackDraft();
        setInterval(trackDraft, 5000);
    </script>
</body>
</html>
